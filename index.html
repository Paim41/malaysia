<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Learn about Malaysia in just 5 minutes! Discover history, culture, food, landmarks, and more in this interactive educational experience." />
  <meta name="keywords" content="Malaysia, learn, education, culture, history, Kuala Lumpur, Petronas, Nasi Lemak, Merdeka" />
  <meta name="author" content="Learn Malaysia" />
  <meta property="og:title" content="Learn Malaysia in 5 Minutes" />
  <meta property="og:description" content="An interactive journey through the culture, history, and wonders of Malaysia." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#012a4a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>Learn Malaysia in 5 Minutes</title>

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>

<!-- ==============================
     LOADING SCREEN
============================== -->
<div id="loading-screen" aria-hidden="true">
  <!-- Built by JS -->
</div>

<!-- ==============================
     MAIN APP
============================== -->
<div id="app">

  <!-- NAVBAR -->
  <nav id="navbar" role="navigation" aria-label="Main navigation">
    <!-- Built by JS -->
  </nav>

  <!-- PROGRESS SIDEBAR -->
  <div id="progress-sidebar" role="navigation" aria-label="Section progress">
    <!-- Built by JS -->
  </div>

  <!-- HERO SECTION -->
  <section id="hero-section" aria-label="Welcome">
    <div class="hero-bg">
      <div class="stars" aria-hidden="true"></div>
    </div>

    <!-- Malaysia Map background -->
    <div class="hero-map-container" aria-hidden="true">
      <div id="hero-map"></div>
    </div>

    <div id="hero-content" class="hero-content">
      <!-- Built by JS -->
    </div>
  </section>

  <!-- CARDS SECTION -->
  <section id="cards-section" aria-label="Learning cards">
    <div id="cards-wrapper" class="cards-wrapper" role="main">
      <!-- Cards built by JS, Quiz & Completion appended here -->
    </div>
  </section>

</div>

<!-- ==============================
     SCRIPTS
============================== -->
<script src="src/data.js"></script>
<script src="src/script.js"></script>

</body>
</html>
